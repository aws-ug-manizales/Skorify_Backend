name: CD DEV (Backend SAM)

# Se dispara con push directo o merge de un PR a develop.
# Un merge de PR a develop produce un push sobre develop, por lo que
# "on: push: branches: [develop]" cubre ambos casos.
"on":
  push:
    branches:
      - develop
    # Solo redesplegar si cambió código que afecta al artefacto SAM.
    # (Quita este bloque 'paths' para desplegar en cualquier push a develop.)
    paths:
      - server/**
      - builders/**
      - .github/workflows/cd-dev.yml
  workflow_dispatch: {}

# Evita despliegues solapados sobre el mismo stack.
concurrency:
  group: cd-dev-backend
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write   # requerido para asumir el rol de AWS vía OIDC

env:
  AWS_REGION: us-east-1
  SKO_PREDICTION_EDITING_WINDOW: ${{ vars.SKO_PREDICTION_EDITING_WINDOW }}

jobs:
  deploy:
    name: Build & Deploy (Skorify-Backend-DEV)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    # NO declarar `environment:` aquí: el rol skorify-backend-deploy confía en
    # el sub `repo:aws-ug-manizales/Skorify_Backend:ref:refs/heads/develop`.
    # Declarar un GitHub Environment cambiaría el sub a `...:environment:NAME`
    # y el AssumeRoleWithWebIdentity fallaría.
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm@10.22.0

      # Sin .npmrc ni tokens: @scifamek-open-source/* está en npm público y
      # @skorify/{domain,data,shared} son deps git sobre repos públicos.

      # Genera builders/dist/template.yaml + builders/dist/samconfig.toml
      # (incluye Cognito, ApiGateway, LambdaSecurityGroup y una Lambda por módulo)
      - name: Generate SAM template (module-lambda-aws)
        working-directory: builders
        run: |
          pnpm install --frozen-lockfile
          pnpm run mla

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v3
        with:
          use-installer: true

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          # Rol definido en Skorify_DevOps (lib/config/iam-roles-config.ts):
          #   arn:aws:iam::968306633562:role/skorify-backend-deploy
          # Guardar ese ARN en el secret AWS_DEPLOY_ROLE_ARN del repo.
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # El samconfig.toml generado ya trae stack_name, region, capabilities
      # y parameter_overrides (VpcId, DbParameterArn, StorageParameterArn, BusParameterArn).
      - name: SAM validate
        working-directory: builders/dist
        run: sam validate --lint

      - name: SAM build
        working-directory: builders/dist
        run: sam build --cached

      - name: SAM deploy
        working-directory: builders/dist
        run: |
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset
