                    properties:
                      kind:
                        type: string
                        enum: [NotGottenUserEnrollmentDomainEvent]

# ==================== COMPONENTS ====================
components:
  schemas:
    # ==================== BASE DOMAIN EVENT SCHEMA ====================
    DomainEventResponse:
      type: object
      description: Estructura base de respuesta de todos los endpoints. Basado en el patrón Domain Event.
      required:
        - kind
        - error
      properties:
        kind:
          type: string
          description: Nombre del Domain Event que identifica el tipo de respuesta
          example: "GottenMatchDomainEvent"
        payload:
          description: Datos de la respuesta (entidad, array, o objeto vacío)
          oneOf:
            - type: object
            - type: array
              items:
                type: object
        error:
          type: boolean
          description: Indica si la respuesta representa un error
          example: false

    # ==================== MATCH SCHEMAS ====================
    Match:
      type: object
      description: Entidad que representa un partido deportivo
      required:
        - id
        - home_team_id
        - away_team_id
        - tournament_id
      properties:
        id:
          type: string
          format: uuid
          description: Identificador único del partido
          example: "match-arg-uru-copa-001"
        home_team_id:
          type: string
          format: uuid
          description: ID del equipo local
          example: "team-argentina"
        away_team_id:
          type: string
          format: uuid
          description: ID del equipo visitante
          example: "team-uruguay"
        tournament_id:
          type: string
          format: uuid
          description: ID del torneo al que pertenece el partido
          example: "tournament-mundial"
        kick_off:
          type: string
          format: date-time
          description: Fecha y hora de inicio del partido
          example: "2026-06-18T20:00:00.000Z"
        home_goals:
          type: integer
          nullable: true
          description: Goles del equipo local
          example: 2
        away_goals:
          type: integer
          nullable: true
          description: Goles del equipo visitante
          example: 1
        status:
          type: string
          enum: [scheduled, in_progress, finished]
          default: scheduled
          description: Estado actual del partido
          example: "scheduled"
        stage:
          type: string
          enum: [group, finals]
          default: group
          description: Etapa del torneo
          example: "group"
        venue:
          type: string
          nullable: true
          description: Lugar donde se juega el partido
          example: "Arena Corinthians"
        created_at:
          type: string
          format: date-time
          description: Fecha de creación del registro
        updated_at:
          type: string
          format: date-time
          nullable: true
          description: Fecha de última actualización

    CreateMatchRequest:
      type: object
      required:
        - homeTeamId
        - awayTeamId
        - tournamentId
        - kickOff
        - stage
      properties:
        homeTeamId:
          type: string
          format: uuid
          description: ID del equipo local
          example: "team-brasil"
        awayTeamId:
          type: string
          format: uuid
          description: ID del equipo visitante
          example: "team-colombia"
        tournamentId:
          type: string
          format: uuid
          description: ID del torneo
          example: "tournament-mundial"
        kickOff:
          type: string
          format: date-time
          description: Fecha y hora de inicio del partido
          example: "2026-06-18T20:00:00.000Z"
        stage:
          type: string
          enum: [group, finals]
          description: Etapa del torneo
          example: "group"
        venue:
          type: string
          description: Lugar del partido
          example: "Arena Corinthians"

    EditMatchRequest:
      type: object
      required:
        - matchId
      properties:
        matchId:
          type: string
          format: uuid
          description: ID del partido a editar
        homeTeamId:
          type: string
          format: uuid
          description: Nuevo ID del equipo local
        awayTeamId:
          type: string
          format: uuid
          description: Nuevo ID del equipo visitante
        date:
          type: string
          format: date-time
          description: Nueva fecha y hora de inicio
        status:
          type: string
          enum: [scheduled, in_progress]
          description: Nuevo estado del partido

    # ==================== PREDICTION SCHEMAS ====================
    Prediction:
      type: object
      description: Entidad que representa una predicción de resultado
      required:
        - id
        - instance_player_id
        - match_id
        - pred_home_goals
        - pred_away_goals
      properties:
        id:
          type: string
          format: uuid
          description: Identificador único de la predicción
        instance_player_id:
          type: string
          format: uuid
          description: ID del jugador en la instancia del torneo
        match_id:
          type: string
          format: uuid
          description: ID del partido pronosticado
        pred_home_goals:
          type: integer
          description: Goles pronosticados para el equipo local
          example: 2
        pred_away_goals:
          type: integer
          description: Goles pronosticados para el equipo visitante
          example: 1
        earned_points:
          type: integer
          default: 0
          description: Puntos ganados con esta predicción
          example: 3
        created_at:
          type: string
          format: date-time
          description: Fecha de creación de la predicción
        updated_at:
          type: string
          format: date-time
          nullable: true
          description: Fecha de última actualización
        deleted_at:
          type: string
          format: date-time
          nullable: true
          description: Fecha de eliminación lógica

    MakePredictionRequest:
      type: object
      required:
        - userId
        - matchId
        - predHomeGoals
        - predAwayGoals
      properties:
        userId:
          type: string
          format: uuid
          description: ID del usuario que realiza la predicción
        matchId:
          type: string
          format: uuid
          description: ID del partido a predecir
        predHomeGoals:
          type: integer
          minimum: 0
          description: Goles pronosticados para el equipo local
          example: 2
        predAwayGoals:
          type: integer
          minimum: 0
          description: Goles pronosticados para el equipo visitante
          example: 1

    # ==================== USER SCHEMAS ====================
    User:
      type: object
      description: Entidad que representa un usuario del sistema
      required:
        - id
        - name
        - email
        - role
      properties:
        id:
          type: string
          format: uuid
          description: Identificador único del usuario
        name:
          type: string
          description: Nombre completo del usuario
          example: "Juan Pérez"
        email:
          type: string
          format: email
          description: Correo electrónico único del usuario
          example: "juan.perez@example.com"
        notificationToken:
          type: string
          description: Token de notificaciones push
        avatar_url:
          type: string
          format: uri
          nullable: true
          description: URL del avatar del usuario
          example: "https://example.com/avatars/user123.jpg"
        role:
          type: string
          enum: [general, global, instance]
          default: general
          description: Rol del usuario en el sistema
          example: "general"
        created_at:
          type: string
          format: date-time
          description: Fecha de creación del usuario
        updated_at:
          type: string
          format: date-time
          nullable: true
          description: Fecha de última actualización
        deleted_at:
          type: string
          format: date-time
          nullable: true
          description: Fecha de eliminación lógica

    CreateUserRequest:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
          description: Nombre completo del usuario
          example: "María García"
        email:
          type: string
          format: email
          description: Correo electrónico del usuario
          example: "maria.garcia@example.com"

    # ==================== TEAM SCHEMAS ====================
    Team:
      type: object
      description: Entidad que representa un equipo deportivo
      required:
        - id
        - name
        - code
      properties:
        id:
          type: string
          format: uuid
          description: Identificador único del equipo
          example: "team-peru"
        name:
          type: string
          description: Nombre completo del equipo
          example: "Perú"
        code:
          type: string
          description: Código único del equipo (ISO 3166-1 alpha-3 para selecciones)
          example: "PER"
        shield_url:
          type: string
          format: uri
          nullable: true
          description: URL del escudo del equipo
          example: "https://example.com/shields/peru.png"
        created_at:
          type: string
          format: date-time
          description: Fecha de creación del registro
        updated_at:
          type: string
          format: date-time
          nullable: true
          description: Fecha de última actualización
        deleted_at:
          type: string
          format: date-time
          nullable: true
          description: Fecha de eliminación lógica

    CreateTeamRequest:
      type: object
      required:
        - name
        - code
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
          description: Nombre del equipo
          example: "Brasil"
        code:
          type: string
          minLength: 2
          maxLength: 10
          description: Código del equipo
          example: "BRA"
        shieldUrl:
          type: string
          format: uri
          description: URL del escudo del equipo
          example: "https://example.com/shields/brasil.png"

    # ==================== TOURNAMENT SCHEMAS ====================
    Tournament:
      type: object
      description: Entidad que representa un torneo o competición
      required:
        - id
        - name
      properties:
        id:
          type: string
          format: uuid
          description: Identificador único del torneo
          example: "tournament-mundial"
        name:
          type: string
          description: Nombre del torneo
          example: "Copa Mundial FIFA 2026"
        start_date:
          type: string
          format: date
          nullable: true
          description: Fecha de inicio del torneo
          example: "2026-06-11"
        end_date:
          type: string
          format: date
          nullable: true
          description: Fecha de finalización del torneo
          example: "2026-07-19"
        matchType:
          type: string
          enum: [SingleMatchPerRound, DoubleMatchPerRound]
          description: Tipo de emparejamiento del torneo
        token:
          type: string
          format: uuid
          description: Token único del torneo
        created_at:
          type: string
          format: date-time
          description: Fecha de creación del registro

    CreateTournamentRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 200
          description: Nombre del torneo
          example: "Copa América 2027"
        startDate:
          type: string
          format: date
          description: Fecha de inicio
          example: "2027-06-15"
        endDate:
          type: string
          format: date
          description: Fecha de finalización
          example: "2027-07-15"
        matchType:
          type: string
          enum: [SingleMatchPerRound, DoubleMatchPerRound]
          description: Tipo de emparejamiento
          example: "SingleMatchPerRound"

    # ==================== TOURNAMENT INSTANCE SCHEMAS ====================
    TournamentInstance:
      type: object
      description: Instancia personalizada de un torneo con reglas específicas
      required:
        - id
        - tournament_id
        - owner_user_id
        - name
        - state
      properties:
        id:
          type: string
          format: uuid
          description: Identificador único de la instancia
        tournament_id:
          type: string
          format: uuid
          description: ID del torneo base
        owner_user_id:
          type: string
          format: uuid
          description: ID del usuario creador de la instancia
        validator_user_id:
          type: string
          format: uuid
          nullable: true
          description: ID del usuario validador
        state:
          type: string
          enum: [active, inactive, pending, approved, denied]
          default: active
          description: Estado de la instancia
          example: "active"
        name:
          type: string
          description: Nombre de la instancia
          example: "Polla Mundial Oficina 2026"
        price:
          type: integer
          default: 0
          description: Precio de entrada a la instancia (en centavos)
          example: 5000
        created_at:
          type: string
          format: date-time
          description: Fecha de creación
        updated_at:
          type: string
          format: date-time
          nullable: true
          description: Fecha de última actualización
        deleted_at:
          type: string
          format: date-time
          nullable: true
          description: Fecha de eliminación lógica

    CreateTournamentInstanceRequest:
      type: object
      required:
        - tournamentId
        - ownerId
        - name
      properties:
        tournamentId:
          type: string
          format: uuid
          description: ID del torneo base
        ownerId:
          type: string
          format: uuid
          description: ID del usuario creador
        name:
          type: string
          minLength: 3
          maxLength: 100
          description: Nombre de la instancia
          example: "Polla Amigos 2026"
        price:
          type: integer
          minimum: 0
          default: 0
          description: Precio de entrada (en centavos)
          example: 10000

    # ==================== USER ENROLLMENT SCHEMAS ====================
    UserEnrollment:
      type: object
      description: |
        Inscripción de un usuario en una instancia de torneo.
        Representa la participación del usuario con su puntuación y posición en el ranking.
      required:
        - id
        - userId
        - tournamentInstanceId
        - tournamentId
      properties:
        id:
          type: string
          format: uuid
          description: Identificador único de la inscripción
        userId:
          type: string
          format: uuid
          description: ID del usuario inscrito
        tournamentInstanceId:
          type: string
          format: uuid
          description: ID de la instancia de torneo
        tournamentId:
          type: string
          format: uuid
          description: ID del torneo base
        joinedAt:
          type: string
          format: date-time
          description: Fecha y hora de inscripción
        lastPosition:
          type: integer
          default: 0
          description: Posición anterior en el ranking
          example: 5
        currentPosition:
          type: integer
          default: 0
          description: Posición actual en el ranking
          example: 3
        currentScore:
          type: integer
          default: 0
          description: Puntuación total acumulada
          example: 47
        streak:
          type: integer
          default: 0
          description: Racha de aciertos consecutivos
          example: 3

    CreateUserEnrollmentRequest:
      type: object
      required:
        - userId
        - tournamentInstanceId
      properties:
        userId:
          type: string
          format: uuid
          description: ID del usuario a inscribir
        tournamentInstanceId:
          type: string
          format: uuid
          description: ID de la instancia de torneo