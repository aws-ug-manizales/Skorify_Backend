AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Parameters:
  Environment:
    Type: String
    Default: dev
    Description: Deployment environment name used in resource names and tags.
  VpcId:
    Type: AWS::EC2::VPC::Id
  PrivateSubnetIdsParameter:
    Type: AWS::SSM::Parameter::Value<List<String>>
    Default: '/skorify/dev/private-subnet-ids'
    Description: SSM parameter path containing a StringList of private subnet IDs for Lambda ENIs
  CognitoUserPoolDomain:
    Type: String
    Description: Prefix for the Cognito hosted UI domain.
  GoogleClientId:
    Type: String
    Description: Google OAuth client ID for Cognito federation
  CognitoCallbackURLs:
    Type: CommaDelimitedList
    Description: Comma-separated callback URLs for the Cognito app client OAuth flow
  DomainName:
    Type: String
    Description: Custom domain name for API Gateway.
  CertificateArn:
    Type: String
    Description: ACM certificate ARN for the custom domain.
  DbParameterArn:
    Type: 'AWS::SSM::Parameter::Value<String>'
    Default: '/skorify/dev/db-secret-arn'
  StorageParameterArn:
    Type: String
    Default: '/skorify/s3/buckets'
  BusParameterArn:
    Type: 'AWS::SSM::Parameter::Value<String>'
    Default: '/skorify/dev/data-bus-name'
  OpsAlertsTopicArn:
    Type: 'AWS::SSM::Parameter::Value<String>'
    Default: '/skorify/dev/ops-alerts-topic-arn'
    Description: ARN del topico SNS de alertas operativas.
