Mappings:
  EnvironmentConfig:
    dev:
      LambdaMemorySize: 512
    prod:
      LambdaMemorySize: 1024

Globals:
  Function:
    Runtime: nodejs22.x
    MemorySize: !FindInMap [EnvironmentConfig, !Ref Environment, LambdaMemorySize]
    Tags:
      Project: skorify
      Environment: !Ref Environment
    CodeUri: .
    VpcConfig:
      SecurityGroupIds:
        - !Ref LambdaSecurityGroup
      SubnetIds: !Ref PrivateSubnetIdsParameter
    Environment:
      Variables:
        DbParameterArn: !Ref DbParameterArn
        StorageParameterArn: !Ref StorageParameterArn
        BusParameterArn: !Ref BusParameterArn

Resources:
  LambdaSharedPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub 'skorify-${Environment}-lambda-policy'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - lambda:InvokeFunction
            Resource:
              - !Sub arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${AWS::StackName}-*
          - Effect: Allow
            Action:
              - ssm:GetParameter
            Resource:
              - !Ref DbParameterArn
              - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${StorageParameterArn}
              - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${BusParameterArn}

          - Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
            Resource:
              - !Ref DbParameterArn
          - Effect: Allow
            Action:
              - events:PutEvents
            Resource:
              - !Sub arn:aws:events:${AWS::Region}:${AWS::AccountId}:event-bus/${BusParameterArn}


  AuthLambdasSharedPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub 'skorify-${Environment}-auth-lambda-policy'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
            Resource:
              - !Ref DbParameterArn

          - Effect: Allow
            Action:
              - cognito-idp:ListUsers
              - cognito-idp:AdminLinkProviderForUser
            Resource: "*"


  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Lambda security group
      VpcId: !Ref VpcId

  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub 'Skorify-user-pool-${Environment}'
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
      Schema:
        - Name: email
          Required: true
          AttributeDataType: String
          Mutable: true
        - Name: name
          AttributeDataType: String
          Required: true
          Mutable: true
      LambdaConfig:
        PreSignUp: !GetAtt PreSignUpLambda.Arn
        PostConfirmation: !GetAtt PostConfirmationLambda.Arn

  PreSignUpPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref PreSignUpLambda
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt CognitoUserPool.Arn

  PostSignUpPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref PostConfirmationLambda
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt CognitoUserPool.Arn

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    DependsOn:
      - CognitoGoogleIdentityProvider
    Properties:
      ClientName: !Sub 'Skorify-user-pool-client-${Environment}'
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH
      SupportedIdentityProviders:
        - COGNITO
        - Google
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - openid
        - email
        - profile
        - phone
      CallbackURLs: !Ref CognitoCallbackURLs
      PreventUserExistenceErrors: ENABLED
      AccessTokenValidity: 1
      IdTokenValidity: 1
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days

  CognitoGoogleIdentityProvider:
    Type: AWS::Cognito::UserPoolIdentityProvider
    Properties:
      UserPoolId: !Ref CognitoUserPool
      ProviderName: Google
      ProviderType: Google
      ProviderDetails:
        client_id: !Ref GoogleClientId
        client_secret: !Sub '{{resolve:secretsmanager:skorify/${Environment}/google-client-secret}}'
        authorize_scopes: openid email profile
      AttributeMapping:
        email: email
        name: name
        email_verified: email_verified
        username: sub

  CognitoResourceServer:
    Type: AWS::Cognito::UserPoolResourceServer
    Properties:
      UserPoolId: !Ref CognitoUserPool
      Identifier: !Sub 'https://api.skorify-${Environment}.cloud-manizales.com'
      Name: SkorifyAPI
      Scopes:
        - ScopeName: internal
          ScopeDescription: Internal service-to-service access

  CognitoM2MClient:
    Type: AWS::Cognito::UserPoolClient
    DependsOn: CognitoResourceServer
    Properties:
      ClientName: !Sub 'Skorify-m2m-client-${Environment}'
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: true
      ExplicitAuthFlows: []
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows:
        - client_credentials
      AllowedOAuthScopes:
        - !Sub 'https://api.skorify-${Environment}.cloud-manizales.com/internal'
      SupportedIdentityProviders: []
      AccessTokenValidity: 1
      TokenValidityUnits:
        AccessToken: hours

  M2MCredentialsSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub 'skorify/${Environment}/m2m-credentials'
      Description: M2M client credentials for service-to-service authentication
      SecretString: !Sub
        - '{"clientId":"${ClientId}","clientSecret":"${ClientSecret}","tokenEndpoint":"https://${CognitoUserPoolDomain}.auth.${AWS::Region}.amazoncognito.com/oauth2/token","scope":"https://api.skorify-${Environment}.cloud-manizales.com/internal"}'
        - ClientId: !Ref CognitoM2MClient
          ClientSecret: !GetAtt CognitoM2MClient.ClientSecret

  M2MCredentialsSecretArnParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/skorify/${Environment}/m2m-credentials-arn'
      Type: String
      Value: !Ref M2MCredentialsSecret
      Description: Secrets Manager ARN containing M2M client credentials

  CognitoAdminsGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: admins
      UserPoolId: !Ref CognitoUserPool
      Description: Admins group

  CognitoManagersGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: managers
      UserPoolId: !Ref CognitoUserPool
      Description: Managers group

  ApiGatewayApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          ThrottlingRateLimit: 100
          ThrottlingBurstLimit: 200
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS,PATCH'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"
      Auth:
        AddDefaultAuthorizerToCorsPreflight: false
        DefaultAuthorizer: JwtAuthorizer
        Authorizers:
          JwtAuthorizer:
            FunctionArn: !GetAtt JwtAuthorizerLambda.Arn
            FunctionPayloadType: TOKEN
            Identity:
              Header: Authorization
              ReauthorizeEvery: 300


  JwtAuthorizerPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref JwtAuthorizerLambda
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGatewayApi}/authorizers/*'

  CognitoUserPoolDomainResource:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Ref CognitoUserPoolDomain
      UserPoolId: !Ref CognitoUserPool

  Api5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Errores 5xx en el API Gateway
      Namespace: AWS/ApiGateway
      MetricName: 5XXError
      Dimensions:
        - Name: ApiName
          Value: !Ref AWS::StackName
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref OpsAlertsTopicArn

  ApiGatewayCustomDomain:
    Type: AWS::ApiGateway::DomainName
    Properties:
      DomainName: !Ref DomainName
      RegionalCertificateArn: !Ref CertificateArn
      EndpointConfiguration:
        Types:
          - REGIONAL

  ApiGatewayBasePathMapping:
    Type: AWS::ApiGateway::BasePathMapping
    DependsOn: ApiGatewayApi
    Properties:
      DomainName: !Ref ApiGatewayCustomDomain
      RestApiId: !Ref ApiGatewayApi
      Stage: prod

{{BODY}}

Outputs:
  SecurityGroupId:
    Value: !Ref LambdaSecurityGroup

  CustomDomainRegionalDomainName:
    Description: Regional domain name to use for Route 53 alias or CNAME
    Value: !GetAtt ApiGatewayCustomDomain.RegionalDomainName

  CustomDomainRegionalHostedZoneId:
    Description: Hosted zone ID for Route 53 alias record
    Value: !GetAtt ApiGatewayCustomDomain.RegionalHostedZoneId

  CognitoHostedUIDomain:
    Description: Cognito hosted UI base URL
    Value: !Sub https://${CognitoUserPoolDomain}.auth.${AWS::Region}.amazoncognito.com

